<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle del Producto - Pingouin Parfums</title>
  <link rel="icon" href="logopag.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: black;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      height: 80px;
    }

    .header-buttons {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    header a {
      background: white;
      color: black;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    header a:hover {
      background: #ddd;
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 24px;
      padding: 10px;
      background: #333;
      border-radius: 10px;
      border: none;
      color: white;
      transition: 0.3s;
    }

    .cart-icon:hover {
      background: #555;
    }

    .cart-count {
      position: absolute;
      top: 0;
      right: 0;
      background: red;
      color: white;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }

    .cart-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .cart-modal.active {
      display: flex;
    }

    .cart-content {
      background: #1c1c1c;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #333;
      padding-bottom: 15px;
    }

    .cart-list {
      margin: 20px 0;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #111;
      margin-bottom: 10px;
      border-radius: 10px;
      border-left: 4px solid #fff;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .cart-item-price {
      color: #bbb;
      font-size: 14px;
    }

    .cart-item-qty {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .qty-btn {
      background: #333;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .qty-btn:hover {
      background: #555;
    }

    .remove-btn {
      background: #d32f2f;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 10px;
    }

    .remove-btn:hover {
      background: #b71c1c;
    }

    .cart-total {
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #333;
      text-align: right;
    }

    .cart-empty {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }

    .checkout-btn {
      background: white;
      color: black;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
      width: 100%;
      font-size: 16px;
      transition: 0.3s;
    }

    .checkout-btn:hover {
      background: #ddd;
    }

    .close-btn {
      background: #333;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .close-btn:hover {
      background: #555;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .producto-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      background: #1c1c1c;
      padding: 40px;
      border-radius: 15px;
    }

    .producto-imagen {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .producto-galeria {
      position: relative;
      width: 100%;
      max-width: 400px;
    }

    .producto-imagen img {
      width: 100%;
      height: auto;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: block;
    }

    .galeria-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 10px;
      pointer-events: none;
    }

    .galeria-btn {
      background: rgba(0, 0, 0, 0.6);
      border: none;
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
      pointer-events: auto;
    }

    .galeria-btn:hover {
      background: rgba(0, 0, 0, 0.9);
    }

    .galeria-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .galeria-indicador {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 15px;
      border-radius: 20px;
    }

    .galeria-puntos {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: 0.3s;
    }

    .galeria-puntos.active {
      background: white;
    }

    .producto-info h1 {
      font-size: 36px;
      margin-bottom: 20px;
      color: #fff;
    }

    .producto-precio {
      font-size: 32px;
      color: #4CAF50;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .producto-descripcion {
      font-size: 16px;
      color: #bbb;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .producto-detalles {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
    }

    .detalle-item {
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #333;
    }

    .detalle-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .detalle-label {
      color: #888;
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .detalle-valor {
      font-weight: bold;
      color: #fff;
      font-size: 16px;
    }

    .product-actions {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .cantidad-selector {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #111;
      padding: 10px 15px;
      border-radius: 10px;
    }

    .cantidad-selector button {
      background: #333;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .cantidad-selector button:hover {
      background: #555;
    }

    .cantidad-selector input {
      background: #222;
      color: white;
      border: none;
      width: 50px;
      text-align: center;
      padding: 5px;
      border-radius: 5px;
    }

    .add-to-cart-btn {
      flex: 1;
      background: white;
      color: black;
      border: none;
      padding: 15px 30px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
      transition: 0.3s;
    }

    .add-to-cart-btn:hover {
      background: #ddd;
    }

    .error-message {
      text-align: center;
      padding: 50px 20px;
    }

    .error-message h2 {
      color: #d32f2f;
      margin-bottom: 20px;
    }

    .error-message a {
      background: white;
      color: black;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .producto-container {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 20px;
      }

      .producto-info h1 {
        font-size: 24px;
      }

      .producto-precio {
        font-size: 24px;
      }

      .product-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<header>

  // Shopping Cart
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let cantidad = 1;

  function getAllProducts() {
    return [...productosDB.arabes, ...productosDB.designer];
  }

  function getProductById(id) {
    const allProducts = getAllProducts();
    return allProducts.find(p => p.id === id);
  }

  function getUrlParameter(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  function renderProducto() {
    const productId = getUrlParameter('id');
    const producto = getProductById(productId);
    const container = document.getElementById('productoContent');

    if (!producto) {
      container.innerHTML = `
        <div class="error-message">
          <h2>Producto no encontrado</h2>
          <p>Lo sentimos, el producto que buscas no existe.</p>
          <a href="catalogo.html">Volver al catálogo</a>
        </div>
      `;
      return;
    }

    const imagenes = producto.imagenes || [producto.imagen];
    imagenesActuales = imagenes;
    imagenActual = 0;

    container.innerHTML = `
      <div class="producto-container">
        <div class="producto-imagen">
          <div class="producto-galeria">
            <img id="productoMainImg" src="${imagenes[0]}" alt="${producto.nombre}">
            ${imagenes.length > 1 ? `
              <div class="galeria-nav">
                <button class="galeria-btn" id="btnPrev" onclick="cambiarImagen(-1)">❮</button>
                <button class="galeria-btn" id="btnNext" onclick="cambiarImagen(1)">❯</button>
              </div>
              <div class="galeria-indicador">
                ${imagenes.map((_, idx) => `<div class="galeria-puntos ${idx === 0 ? 'active' : ''}" onclick="irAImagen(${idx})"></div>`).join('')}
              </div>
            ` : ''}
          </div>
        </div>
        <div class="producto-info">
          <h1>${producto.nombre}</h1>
          <div class="producto-precio">$${producto.precio.toLocaleString('es-AR')}</div>
          <div class="producto-descripcion">${producto.descripcion}</div>
          
          <div class="producto-detalles">
            <div class="detalle-item">
              <div class="detalle-label">Notas de olor</div>
              <div class="detalle-valor">${producto.notas}</div>
            </div>
            <div class="detalle-item">
              <div class="detalle-label">Volumen</div>
              <div class="detalle-valor">${producto.volumen}</div>
            </div>
            <div class="detalle-item">
              <div class="detalle-label">Tipo</div>
              <div class="detalle-valor">${producto.tipo}</div>
            </div>
            <div class="detalle-item">
              <div class="detalle-label">Durabilidad</div>
              <div class="detalle-valor">${producto.durabilidad}</div>
            </div>
          </div>

          <div class="product-actions">
            <div class="cantidad-selector">
              <button onclick="decrementarCantidad()">-</button>
              <input type="number" id="cantidad" value="1" min="1" readonly>
              <button onclick="incrementarCantidad()">+</button>
            </div>
            <button class="add-to-cart-btn" onclick="addToCartProducto('${producto.nombre}', ${producto.precio})">
              Agregar al carrito
            </button>
          </div>
        </div>
      </div>
    `;
  }

  function incrementarCantidad() {
    cantidad++;
    document.getElementById('cantidad').value = cantidad;
  }

  function decrementarCantidad() {
    if (cantidad > 1) {
      cantidad--;
      document.getElementById('cantidad').value = cantidad;
    }
  }

  let imagenActual = 0;
  let imagenesActuales = [];

  function cambiarImagen(direccion) {
    imagenActual += direccion;

    if (imagenActual < 0) {
      imagenActual = imagenesActuales.length - 1;
    } else if (imagenActual >= imagenesActuales.length) {
      imagenActual = 0;
    }

    actualizarGaleria();
  }

  function irAImagen(index) {
    imagenActual = index;
    actualizarGaleria();
  }

  function actualizarGaleria() {
    const img = document.getElementById('productoMainImg');
    const puntos = document.querySelectorAll('.galeria-puntos');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');

    if (img) {
      img.src = imagenesActuales[imagenActual];
    }

    if (puntos.length > 0) {
      puntos.forEach((punto, idx) => {
        punto.classList.remove('active');
        if (idx === imagenActual) {
          punto.classList.add('active');
        }
      });
    }

    if (btnPrev) btnPrev.disabled = imagenActual === 0;
    if (btnNext) btnNext.disabled = imagenActual === imagenesActuales.length - 1;
  }

  function addToCartProducto(name, price) {
    for (let i = 0; i < cantidad; i++) {
      const existingItem = cart.find(item => item.name === name);
      
      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        cart.push({ name, price, quantity: 1 });
      }
    }
    
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    renderCart();
    alert(`${cantidad} unidad(es) de ${name} agregada(s) al carrito`);
    cantidad = 1;
    document.getElementById('cantidad').value = 1;
  }

  function removeFromCart(name) {
    cart = cart.filter(item => item.name !== name);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    renderCart();
  }

  function updateQuantity(name, quantity) {
    const item = cart.find(item => item.name === name);
    if (item) {
      item.quantity = Math.max(1, quantity);
      if (item.quantity === 0) {
        removeFromCart(name);
      } else {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        renderCart();
      }
    }
  }

  function updateCartCount() {
    const count = cart.reduce((total, item) => total + item.quantity, 0);
    const countElement = document.getElementById('cartCount');
    
    if (count > 0) {
      countElement.textContent = count;
      countElement.style.display = 'flex';
    } else {
      countElement.style.display = 'none';
    }
  }

  function renderCart() {
    const cartList = document.getElementById('cartList');
    
    if (cart.length === 0) {
      cartList.innerHTML = '<div class="cart-empty">El carrito está vacío</div>';
      document.getElementById('cartTotal').textContent = '0';
      return;
    }

    let total = 0;
    let html = '';

    cart.forEach((item) => {
      const subtotal = item.price * item.quantity;
      total += subtotal;
      
      html += `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">$${item.price.toLocaleString('es-AR')}</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="updateQuantity('${item.name}', ${item.quantity - 1})">-</button>
            <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
            <button class="qty-btn" onclick="updateQuantity('${item.name}', ${item.quantity + 1})">+</button>
            <button class="remove-btn" onclick="removeFromCart('${item.name}')">Eliminar</button>
          </div>
        </div>
      `;
    });

    cartList.innerHTML = html;
    document.getElementById('cartTotal').textContent = total.toLocaleString('es-AR');
  }

  function toggleCart() {
    const modal = document.getElementById('cartModal');
    modal.classList.toggle('active');
    renderCart();
  }

  function checkout() {
    if (cart.length === 0) {
      alert('El carrito está vacío');
      return;
    }
    
    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    
    // Crear mensaje para WhatsApp
    let mensaje = '🛍️ *Pedido de Pingoun Parfums*\n\n';
    mensaje += '*Detalles del pedido:*\n';
    
    cart.forEach((item, index) => {
      const subtotal = item.price * item.quantity;
      mensaje += `${index + 1}. ${item.name}\n`;
      mensaje += `   Cantidad: ${item.quantity}\n`;
      mensaje += `   Precio unitario: $${item.price.toLocaleString('es-AR')}\n`;
      mensaje += `   Subtotal: $${subtotal.toLocaleString('es-AR')}\n\n`;
    });
    
    mensaje += `*Total: $${total.toLocaleString('es-AR')}*\n\n`;
    mensaje += '¿Confirmas tu pedido?';
    
    // Codificar mensaje para URL
    const mensajeCodeado = encodeURIComponent(mensaje);
    const numeroWhatsApp = '543541396860';
    const urlWhatsApp = `https://wa.me/${numeroWhatsApp}?text=${mensajeCodeado}`;
    
    // Abrir WhatsApp
    window.open(urlWhatsApp, '_blank');
    
    // Limpiar carrito
    cart = [];
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    renderCart();
    toggleCart();
  }

  // Inicializar
  renderProducto();
  updateCartCount();
</script>

</body>
</html>
