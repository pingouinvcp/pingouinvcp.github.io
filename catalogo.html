<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo Completo - Pingouin Parfums</title>
  <link rel="icon" href="logopag.png">
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: white;
    }


    header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      background: black;
      position: sticky;
      top: 0;
      z-index: 100;
      height: 120px;
      min-height: 120px;
      gap: 0;
    }

    .header-btn-left {
      margin-right: auto;
      display: flex;
      align-items: center;
      height: 100%;
    }

    .logo {
      height: 100%;
      max-height: 120px;
      display: block;
      margin: 0 auto;
      object-fit: contain;
    }

    .cart-icon {
      margin-left: auto;
    }

    header a {
      background: white;
      color: black;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      margin-left: 0;
    }

    header a:hover {
      background: #ddd;
    }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 24px;
      padding: 10px;
      background: #333;
      border-radius: 10px;
      border: none;
      color: white;
      transition: 0.3s;
      margin-left: 20px;
    }

    .cart-icon:hover {
      background: #555;
    }

    .cart-count {
      position: absolute;
      top: 0;
      right: 0;
      background: red;
      color: white;
      border-radius: 50%;
      width: 25px;
      height: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }

    .cart-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .cart-modal.active {
      display: flex;
    }

    .cart-content {
      background: #1c1c1c;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #333;
      padding-bottom: 15px;
    }

    .cart-list {
      margin: 20px 0;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #111;
      margin-bottom: 10px;
      border-radius: 10px;
      border-left: 4px solid #fff;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .cart-item-price {
      color: #bbb;
      font-size: 14px;
    }

    .cart-item-qty {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .qty-btn {
      background: #333;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .qty-btn:hover {
      background: #555;
    }

    .remove-btn {
      background: #d32f2f;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      margin-left: 10px;
    }

    .remove-btn:hover {
      background: #b71c1c;
    }

    .cart-total {
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #333;
      text-align: right;
    }

    .cart-empty {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }

    .checkout-btn {
      background: white;
      color: black;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
      width: 100%;
      font-size: 16px;
      transition: 0.3s;
    }

    .checkout-btn:hover {
      background: #ddd;
    }

    .close-btn {
      background: #333;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .close-btn:hover {
      background: #555;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      color: #fff;
    }

    .section-title {
      font-size: 28px;
      margin: 40px 0 20px 0;
      border-bottom: 3px solid #fff;
      padding-bottom: 10px;
    }

    .productos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card-catalogo {
      background: #1c1c1c;
      border-radius: 15px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      height: 320px;
      justify-content: flex-start;
    }

    .card-catalogo:hover {
      transform: translateY(-10px);
      box-shadow: 0 10px 25px rgba(255,255,255,0.1);
    }

    .card-catalogo img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      margin-bottom: 10px;
    }

    .card-catalogo-info {
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 1;
      gap: 6px;
    }

    .card-catalogo-name {
      font-weight: bold;
      margin-bottom: 4px;
      font-size: 16px;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-catalogo-price {
      color: #4CAF50;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 0;
    }

    .card-catalogo-btn {
      width: 100%;
      padding: 10px;
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
      margin-top: 0;
    }

    .card-catalogo-btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>

<header>
  <div class="header-btn-left">
    <a href="index.html">← Volver al inicio</a>
  </div>
  <div style="flex:1; display:flex; justify-content:center; align-items:center; height:100%;">
    <img src="B.png" class="logo">
  </div>
  <button class="cart-icon" onclick="toggleCart()">
    🛒
    <span class="cart-count" id="cartCount" style="display: none;">0</span>
  </button>
</header>

<!-- CART MODAL -->
<div class="cart-modal" id="cartModal">
  <div class="cart-content">
    <div class="cart-header">
      <h2>Carrito de Compras</h2>
      <button class="close-btn" onclick="toggleCart()">Cerrar</button>
    </div>
    
    <div class="cart-list" id="cartList">
      <div class="cart-empty">El carrito está vacío</div>
    </div>
    
    <div class="cart-total">
      Total: $<span id="cartTotal">0</span>
    </div>
    
    <button class="checkout-btn" onclick="checkout()">Proceder al Pago</button>
  </div>
</div>

<div class="container">
  <h1>Catálogo Completo - Pingouin Parfums</h1>

  <!-- PERFUMES ÁRABES -->
  <h2 class="section-title">Perfumes Árabes</h2>
  <div class="productos-grid" id="arabsGrid"></div>

  <!-- PERFUMES DISEÑADOR -->
  <h2 class="section-title">Perfumes de Diseñador</h2>
  <div class="productos-grid" id="designerGrid"></div>
</div>

<script>
  // Datos de productos
  const productos = {
    arabes: [
      {
        id: 'afnan-9pm',
        nombre: 'Afnan 9PM',
        precio: 69000,
        imagen: 'https://recal.com.ar/uploads/AFNAN%209%20PM%20MEN%20EDP%20X%20100%20ML.-01.jpg',
        descripcion: 'Perfume árabe sofisticado con notas orientales profundas',
        notas: 'Notas de olor: Oud, Especias, Almíbar',
        volumen: '100ml'
      },
      {
        id: 'lattafa-asad',
        nombre: 'Lattafa Asad Bourbon',
        precio: 99000,
        imagen: 'https://acdn-us.mitiendanube.com/stores/003/226/824/products/1024-x-1024-px-2025-05-04t225835-636-487a509fe4bbb3bd6317464103199324-1024-1024.webp',
        descripcion: 'Fragancia intensa y masculina con carácter oriental',
        notas: 'Notas de olor: Bourbon, Ámbar, Madera',
        volumen: '100ml'
      },
      {
        id: 'armaf-mandarin',
        nombre: 'Armaf Mandarin Sky',
        precio: 69000,
        imagen: 'https://cdnx.jumpseller.com/matis1/image/67764697/resize/1000/1000?1758559039',
        descripcion: 'Aroma fresco con notas cítricas y toques orientales',
        notas: 'Notas de olor: Mandarina, Almizcares, Cedro',
        volumen: '100ml'
      },
      {
        id: 'rasasi-hawas',
        nombre: 'Rasasi Hawas Ice',
        precio: 109000,
        imagen: 'https://http2.mlstatic.com/D_Q_NP_724947-MLU74163301315_012024-O.webp',
        descripcion: 'Fragancia fresca y refrescante con toque de hielo',
        notas: 'Notas de olor: Hielo, Bergamota, Ámbar',
        volumen: '100ml'
      },
      {
        id: 'french-vulcan',
        nombre: 'French Avenue Vulcan Feu',
        precio: 99000,
        imagen: 'https://fragrances.com.ng/media/catalog/product/cache/0daeb07bb1d294c1f281fab47369d56a/f/r/french_avenue_vulcan_feu-1.jpg',
        descripcion: 'Aroma ardiente y especiado con carácter fuerte',
        notas: 'Notas de olor: Especias, Fuego, Madera',
        volumen: '100ml'
      }
    ],
    designer: [
      {
        id: 'dior-sauvage',
        nombre: 'Dior Sauvage EDP',
        precio: 390000,
        imagen: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSC6GMkwrWD0vMzMCOMdC3lH1K-PtsbUwzjSg&s',
        descripcion: 'Clásico atemporal con notas frescas y especiadas',
        notas: 'Notas de olor: Ambroxan, Pimienta, Ajenjo',
        volumen: '100ml'
      },
      {
        id: 'versace-eros',
        nombre: 'Versace Eros EDT',
        precio: 169000,
        imagen: 'https://nextcell.com.ar/wp-content/uploads/2024/12/D_Q_NP_851229-MLA46088840723_052021-O.webp',
        descripcion: 'Fragancia fresca y sensual con carácter divino',
        notas: 'Notas de olor: Menta, Pistacho, Vainilla',
        volumen: '100ml'
      },
      {
        id: 'jp-gaultier',
        nombre: 'JP Gaultier Le Male Elixir',
        precio: 279000,
        imagen: 'https://felix.com.pa/cdn/shop/files/1086-65189083_2_600x.jpg?v=1729275283',
        descripcion: 'Fragrancia oriental y especiada de larga duración',
        notas: 'Notas de olor: Ámbar, Vainilla, Miel',
        volumen: '125ml'
      },
      {
        id: 'xerjoff-erba',
        nombre: 'Xerjoff Erba Pura',
        precio: 569000,
        imagen: 'https://http2.mlstatic.com/D_970456-MLA98385992798_112025-C.jpg',
        descripcion: 'Fragancia sofisticada con toques herbales puros',
        notas: 'Notas de olor: Albahaca, Aldehdos, Almizcares',
        volumen: '100ml'
      },
      {
        id: 'ga-stronger',
        nombre: 'GA Stronger With You EDP',
        precio: 299000,
        imagen: 'https://yauras.cl/cdn/shop/files/Disenosintitulo_4_55dc84be-2355-431f-b845-2eba1b643a03_700x700.jpg?v=1764006452',
        descripcion: 'Aroma intenso y adictivo para hombres modernos',
        notas: 'Notas de olor: Especias, Madera, Ámbar',
        volumen: '100ml'
      }
    ]
  };

  // Shopping Cart
  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  function renderProductos() {
    // Renderizar árabes
    const arabsGrid = document.getElementById('arabsGrid');
    arabsGrid.innerHTML = productos.arabes.map(p => crearCardProducto(p)).join('');

    // Renderizar diseñadores
    const designerGrid = document.getElementById('designerGrid');
    designerGrid.innerHTML = productos.designer.map(p => crearCardProducto(p)).join('');
  }

  function crearCardProducto(producto) {
    return `
      <div class="card-catalogo" onclick="irAProducto('${producto.id}')">
        <img src="${producto.imagen}" alt="${producto.nombre}">
        <div class="card-catalogo-info">
          <div class="card-catalogo-name">${producto.nombre}</div>
          <div class="card-catalogo-price">$${producto.precio.toLocaleString('es-AR')}</div>
          <button class="card-catalogo-btn" onclick="event.stopPropagation(); addToCart('${producto.nombre}', ${producto.precio})">
            Agregar al carrito
          </button>
        </div>
      </div>
    `;
  }

  function irAProducto(productId) {
    window.location.href = `producto.html?id=${productId}`;
  }

  function addToCart(name, price) {
    const existingItem = cart.find(item => item.name === name);
    
    if (existingItem) {
      existingItem.quantity += 1;
    } else {
      cart.push({ name, price, quantity: 1 });
    }
    
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    renderCart();
    alert(`${name} agregado al carrito`);
  }

  function removeFromCart(name) {
    cart = cart.filter(item => item.name !== name);
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    renderCart();
  }

  function updateQuantity(name, quantity) {
    const item = cart.find(item => item.name === name);
    if (item) {
      item.quantity = Math.max(1, quantity);
      if (item.quantity === 0) {
        removeFromCart(name);
      } else {
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        renderCart();
      }
    }
  }

  function updateCartCount() {
    const count = cart.reduce((total, item) => total + item.quantity, 0);
    const countElement = document.getElementById('cartCount');
    
    if (count > 0) {
      countElement.textContent = count;
      countElement.style.display = 'flex';
    } else {
      countElement.style.display = 'none';
    }
  }

  function renderCart() {
    const cartList = document.getElementById('cartList');
    
    if (cart.length === 0) {
      cartList.innerHTML = '<div class="cart-empty">El carrito está vacío</div>';
      document.getElementById('cartTotal').textContent = '0';
      return;
    }

    let total = 0;
    let html = '';

    cart.forEach((item) => {
      const subtotal = item.price * item.quantity;
      total += subtotal;
      
      html += `
        <div class="cart-item">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">$${item.price.toLocaleString('es-AR')}</div>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn" onclick="updateQuantity('${item.name}', ${item.quantity - 1})">-</button>
            <span style="min-width: 30px; text-align: center;">${item.quantity}</span>
            <button class="qty-btn" onclick="updateQuantity('${item.name}', ${item.quantity + 1})">+</button>
            <button class="remove-btn" onclick="removeFromCart('${item.name}')">Eliminar</button>
          </div>
        </div>
      `;
    });

    cartList.innerHTML = html;
    document.getElementById('cartTotal').textContent = total.toLocaleString('es-AR');
  }

  function toggleCart() {
    const modal = document.getElementById('cartModal');
    modal.classList.toggle('active');
    renderCart();
  }

  function checkout() {
    if (cart.length === 0) {
      alert('El carrito está vacío');
      return;
    }
    
    const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    
    // Crear mensaje para WhatsApp
    let mensaje = '🛍️ *Pedido de Pingoun Parfums*\n\n';
    mensaje += '*Detalles del pedido:*\n';
    
    cart.forEach((item, index) => {
      const subtotal = item.price * item.quantity;
      mensaje += `${index + 1}. ${item.name}\n`;
      mensaje += `   Cantidad: ${item.quantity}\n`;
      mensaje += `   Precio unitario: $${item.price.toLocaleString('es-AR')}\n`;
      mensaje += `   Subtotal: $${subtotal.toLocaleString('es-AR')}\n\n`;
    });
    
    mensaje += `*Total: $${total.toLocaleString('es-AR')}*\n\n`;
    mensaje += '¿Confirmas tu pedido?';
    
    // Codificar mensaje para URL
    const mensajeCodeado = encodeURIComponent(mensaje);
    const numeroWhatsApp = '543541396860';
    const urlWhatsApp = `https://wa.me/${numeroWhatsApp}?text=${mensajeCodeado}`;
    
    // Abrir WhatsApp
    window.open(urlWhatsApp, '_blank');
    
    // Limpiar carrito
    cart = [];
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    renderCart();
    toggleCart();
  }

  // Inicializar
  renderProductos();
  updateCartCount();
</script>

</body>
</html>
